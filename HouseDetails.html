<div class="container">

  <!-- NAVBAR (reuse style from owner profile) -->
  <header class="navbar">
    <img class="logo" src="logofindsb.png" alt="Logo">

    <nav class="nav-links">
      <span onclick="window.location.href='OwnerHouses.html'">Houses</span>
      <span>Customer list</span>

      <div class="profile-dropdown">
        <span class="profile-link">Profile &#9662;</span>
        <div class="dropdown-content">
          <a href="#">Settings</a>
          <a href="#" onclick="deleteAccount()">Delete Account</a>
          <a href="PersonainfoSettingOWNER.html">Edit Account</a>
        </div>
      </div>
    </nav>

    <div class="logout-btn" onclick="logout()">
      Logout
    </div>
  </header>

  <main class="page">
    <div class="house-detail-card" id="houseDetail">
      <!-- Filled by JS -->
    </div>
  </main>
</div>

<script>
  function goBackToOwnerProfile() {
    window.location.href = "OWnerPRofile.html";
  }

  function deleteAccount() {
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    if (!loggedInUser) {
      alert("No user is currently logged in!");
      return;
    }

    if (confirm("Are you sure you want to delete your account? This cannot be undone.")) {
      let allUsers = JSON.parse(localStorage.getItem("allUsers")) || [];
      allUsers = allUsers.filter(user => user.email !== loggedInUser.email);
      localStorage.setItem("allUsers", JSON.stringify(allUsers));

      localStorage.removeItem("loggedInUser");

      alert("Account deleted successfully.");
      window.location.href = "landingpage.html";
    }
  }

  function logout() {
    localStorage.removeItem("loggedInUser");
    alert("You have been logged out.");
    window.location.href = "landingpage.html";
  }

  document.addEventListener("DOMContentLoaded", function () {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const container = document.getElementById("houseDetail");
    let houses = JSON.parse(localStorage.getItem("houses") || "[]");
    const house = houses.find(h => h.id === id);

    if (!house) {
      container.innerHTML = "<p>House not found.</p>";
      return;
    }

    const rooms = Array.isArray(house.rooms) ? house.rooms : [];

    // compute price summary
    let priceSummary = "No rooms yet";
    if (rooms.length > 0) {
      const prices = rooms.map(r => parseFloat(r.roomPrice)).filter(n => !isNaN(n));
      if (prices.length > 0) {
        const minPrice = Math.min(...prices);
        priceSummary = "From ₱" + minPrice;
      }
    }

    container.innerHTML = `
      <div class="house-header">
        <div class="house-image-wrapper">
          ${
            house.imageDataUrl
              ? `<img src="${house.imageDataUrl}" alt="${house.houseName}">`
              : "No house image"
          }
        </div>
        <div class="house-main-info">
          <div class="house-category">${house.houseCategory || ""}</div>
          <div class="house-title">${house.houseName || "Untitled house"}</div>
          <div class="house-line">${house.location || "No location provided"}</div>
          <div class="house-line">
            Rooms: ${house.numRooms || 0} • ${priceSummary}
          </div>
          <div>
            ${
              house.plateNumber
                ? `<span class="tag">Plate #: ${house.plateNumber}</span>`
                : ""
            }
          </div>
          <div class="house-actions">
            <button class="btn-small btn-back" onclick="window.location.href='OwnerHouses.html'">
              ← Back to houses
            </button>
            <button class="btn-small btn-edit" onclick="window.location.href='CreateHouse.html?id=${encodeURIComponent(house.id)}#roomsSection'">
              Edit house & rooms
            </button>
            ${
              house.mapLocation && house.mapLocation.trim() !== ""
                ? `<button class="btn-small btn-map" onclick="window.open('${house.mapLocation}','_blank')">
                    Open in Google Maps
                   </button>`
                : ""
            }
          </div>
        </div>
      </div>

      <div>
        <div class="section-title">House description</div>
        ${
          house.description && house.description.trim() !== ""
            ? `<div class="house-description">${house.description}</div>`
            : `<div class="muted">No description provided.</div>`
        }
      </div>

      <div style="margin-top: 18px;">
        <div class="section-title">Rooms</div>
        ${
          rooms.length === 0
            ? `<div class="muted">No rooms have been added to this house yet.</div>`
            : `<div class="rooms-grid">
                ${rooms.map(room => `
                  <div class="room-card">
                    <div class="room-img-wrapper">
                      ${
                        room.imageDataUrl
                          ? `<img src="${room.imageDataUrl}" alt="${room.roomType || 'Room'}">`
                          : "No room image"
                      }
                    </div>
                    <div class="room-body">
                      <div class="room-title">${room.roomType || "Room"}</div>
                      <div class="room-line">Room #${room.roomNumber || "-"}</div>
                      <div class="room-line">Price: ₱${room.roomPrice || "0"}</div>
                      <div class="room-line">Capacity: ${room.roomCapacity || "-"} person/s</div>
                      <div class="room-line">Availability: ${room.roomAvailability || "N/A"}</div>
                      ${
                        room.roomDescription && room.roomDescription.trim() !== ""
                          ? `<div class="room-description">${room.roomDescription}</div>`
                          : ""
                      }
                    </div>
                    <div class="room-footer">
                      <button class="room-edit-btn"
                        onclick="window.location.href='CreateHouse.html?id=${encodeURIComponent(house.id)}#roomsSection'">
                        Edit rooms
                      </button>
                    </div>
                  </div>
                `).join("")}
              </div>`
        }
      </div>
    `;
  });
</script>

</body>
</html>
