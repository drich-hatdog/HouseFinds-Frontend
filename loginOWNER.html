<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Login - HouseFinds</title>
  <link rel="stylesheet" href="loginOWNERS.css" />
  <script src="auth.js" defer></script>
</head>
<body>

<div class="auth-page owner-theme">

  <div class="auth-container">
    <header class="auth-header">
      <a href="landingpage.html">
        <img src="logofindsw.png" alt="HouseFinds" class="auth-logo" />
      </a>
    </header>

    <main class="auth-main">
      <section class="auth-card">
        <div class="auth-left">
          <h1 class="auth-title">Welcome back, Owner !</h1>
          <p class="auth-subtitle">
            Log in to manage your boarding houses, rooms, and reservations from one dashboard.
          </p>

          <form class="auth-form" onsubmit="event.preventDefault(); loginUser();">
            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" placeholder="Enter email" required />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" placeholder="Enter password" required />
            </div>

            <div class="form-meta">
              <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary">Log In</button>
          </form>

          <p class="auth-switch">
            Don’t have an owner account?
            <a href="RegisterOWNER.html">Sign up</a>
          </p>
        </div>

        <div class="auth-right">
          <p class="social-label">Or continue with</p>
          <div class="social-row">
            <button type="button" class="social-btn">
              <img src="Facebook logo.png" alt="Facebook" />
            </button>
            <button type="button" class="social-btn">
              <img src="Google logo.png" alt="Google" />
            </button>
            <button type="button" class="social-btn">
              <img src="Twitter logo.png" alt="Twitter" />
            </button>
            <button type="button" class="social-btn">
              <img src="telegram logo.png" alt="Telegram" />
            </button>
          </div>

          <div class="auth-side-note">
            You are logging in as an <span>Owner</span>.  
            Use this account only for managing your boarding house listings.
          </div>
        </div>
      </section>
    </main>
  </div>

</div>

</body>
</html>
