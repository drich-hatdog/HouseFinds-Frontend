<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="Ownerprofilee.css">
  <link rel="stylesheet" href="customerDashboard.css">
</head>

<body>
<div class="container">

  <header class="navbar">
    <img class="logo" src="logofindsb.png" alt="Logo">
    <nav class="nav-links">
      <span onclick="goDashboard()" class="custolist">Dashboard</span>
      <span onclick="goReservations()" class="booking">Reservations</span>
      <span onclick="goProfile()" class="booking">Profile</span>
    </nav>
    <div class="logout-btn" onclick="logout()">Log Out</div>
  </header>

  <main class="dashboard-container">
    <h1 class="dash-title">Find Your Ideal Boarding House</h1>
    <p class="dash-subtitle">
      Browse available boarding houses from different owners and reserve a room that fits your budget.
    </p>

    <div class="search-section">
      <input
        type="text"
        id="searchInput"
        placeholder="Search houses or locations..."
        oninput="filterHouses()">
    </div>

    <div class="filter-buttons">
      <button onclick="sortAffordable()">Affordable</button>
      <button onclick="sortRated()">Top Rated</button>
      <button onclick="sortNearby()">Nearby</button>
    </div>

    <p id="emptyMessage" class="empty-message">
      No houses are available yet. Please check again later.
    </p>

    <div id="housesList" class="houses-list"></div>
  </main>
</div>

<script>
  let allHouses = [];
  let currentList = [];

  document.addEventListener("DOMContentLoaded", () => {
    loadHouses();
  });

  async function loadHouses() {
    const listContainer = document.getElementById("housesList");
    const emptyMessage = document.getElementById("emptyMessage");

    try {
 
      const response = await fetch(' https://housefinds-backend.up.railway.app/api/rooms');

       const data = await response.json();

      allHouses = data;

      if (!allHouses.length) {
        listContainer.innerHTML = "";
        emptyMessage.style.display = "block";
        return;
      }

      emptyMessage.style.display = "none";
      currentList = [...allHouses];
      renderHouses(currentList);

    } catch (err) {
      emptyMessage.style.display = "block";
      emptyMessage.textContent = "Could not load houses. Make sure the server is running.";
      console.error(err);
    }
  }

  function renderHouses(houses) {
    const listContainer = document.getElementById("housesList");
    listContainer.innerHTML = "";

    if (!houses.length) {
      document.getElementById("emptyMessage").style.display = "block";
      return;
    } else {
      document.getElementById("emptyMessage").style.display = "none";
    }

    houses.forEach((house) => {
      const card = document.createElement("div");
      card.classList.add("house-card");

      const imgSrc = house.image_url && house.image_url.trim() !== ""
        ? house.image_url
        : "https://placehold.co/600x400";

      card.innerHTML = `
        <img src="${imgSrc}" class="house-img" alt="${house.title || 'Boarding House'}">
        <div class="house-content">
          <h3 class="house-title">${house.title || 'Untitled House'}</h3>
          <p class="house-price">₱${house.price || 0} / month</p>
          <p class="house-location">${house.location || 'No location provided'}</p>
        </div>
      `;

      card.onclick = () => {
        localStorage.setItem("selectedRoom", JSON.stringify(house));
        window.location.href = "HouseDetailsCustomer.html";
      };

      listContainer.appendChild(card);
    });
  }

  function filterHouses() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allHouses.filter(h =>
      (h.title || '').toLowerCase().includes(term) ||
      (h.location || '').toLowerCase().includes(term)
    );
    currentList = filtered;
    renderHouses(filtered);
  }

  function sortAffordable() {
    const sorted = [...currentList].sort((a, b) => 
      (parseFloat(a.price) || 0) - (parseFloat(b.price) || 0)
    );
    renderHouses(sorted);
  }

  function sortRated() {
    const sorted = [...currentList].sort((a, b) => 
      (b.rating || 0) - (a.rating || 0)
    );
    renderHouses(sorted);
  }

  function sortNearby() {
    alert("Nearby filter coming soon!");
  }

  function goProfile() {
    window.location.href = "Customerprofile.html";
  }

  function goDashboard() {
    window.location.href = "customerDashboard.html";
  }

  function goReservations() {
    window.location.href = "customerReservations.html";
  }

  function logout() {
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("token");
    window.location.href = "landingpage.html";
  }
</script>
</body>
</html>
