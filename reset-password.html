<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - HouseFinds</title>
  <link rel="stylesheet" href="RegisteredCustomer.css">
  <style>
    .reset-card {
      max-width: 440px;
      margin: 120px auto;
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(11,37,69,0.10);
    }
    .reset-icon { font-size: 3rem; margin-bottom: 16px; }
    .reset-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #0B2545;
      margin-bottom: 10px;
    }
    .reset-subtitle {
      color: #7A90A8;
      font-size: 0.95rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .input-field {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid #E8C96A;
      border-radius: 10px;
      outline: none;
      color: #0B2545;
      margin-bottom: 16px;
      font-family: 'DM Sans', sans-serif;
      box-sizing: border-box;
    }
    .input-field:focus { border-color: #C9A84C; }
    .input-label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 500;
      color: #0B2545;
      margin-bottom: 6px;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #E8C96A, #C9A84C);
      color: #0B2545;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover { opacity: 0.85; }
  </style>
</head>
<body style="background: #0B2545; min-height: 100vh;">

  <div class="reset-card">
    <div class="reset-icon">🔑</div>
    <h1 class="reset-title">Set new password</h1>
    <p class="reset-subtitle">
      Choose a strong new password for your HouseFinds account.
    </p>

    <label class="input-label">New Password</label>
    <input
      type="password"
      id="new-password"
      class="input-field"
      placeholder="Enter new password"
    >

    <label class="input-label">Confirm Password</label>
    <input
      type="password"
      id="confirm-password"
      class="input-field"
      placeholder="Confirm new password"
    >

    <button class="btn-submit" onclick="resetPassword()">
      Reset Password
    </button>
  </div>

  <script src="auth.js"></script>
</body>
</html>
